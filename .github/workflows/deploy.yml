name: AWS Infrastructure Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Terraform Apply and Ansible Deploy
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.7

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve -input=false

      - name: Capture Terraform Outputs
        working-directory: terraform
        run: |
          echo "WEB_1_IP=$(terraform output -raw web_1_public_ip)" >> $GITHUB_ENV
          echo "WEB_2_IP=$(terraform output -raw web_2_public_ip)" >> $GITHUB_ENV
          echo "WEB_SG_ID=$(terraform output -raw web_security_group_id)" >> $GITHUB_ENV

      - name: Get GitHub Runner Public IP
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV

      - name: Temporarily Allow SSH From GitHub Runner
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id "$WEB_SG_ID" \
            --protocol tcp \
            --port 22 \
            --cidr "$RUNNER_IP/32" || true

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Prepare SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/aws-infra-key
          chmod 600 ~/.ssh/aws-infra-key
          ssh-keyscan -H "$WEB_1_IP" >> ~/.ssh/known_hosts
          ssh-keyscan -H "$WEB_2_IP" >> ~/.ssh/known_hosts

      - name: Generate Ansible Inventory
        run: |
          cat > ansible/inventory.ini <<EOF
          [webservers]
          web1 ansible_host=$WEB_1_IP
          web2 ansible_host=$WEB_2_IP

          [webservers:vars]
          ansible_user=ec2-user
          ansible_ssh_private_key_file=~/.ssh/aws-infra-key
          EOF

      - name: Run Ansible Playbook
        run: ansible-playbook -i ansible/inventory.ini ansible/playbook.yml

      - name: Remove Temporary SSH Access
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "$WEB_SG_ID" \
            --protocol tcp \
            --port 22 \
            --cidr "$RUNNER_IP/32" || true